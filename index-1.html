<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>WeekFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== BOTTOM NAV (mobile) ===== -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bnav-btn active" id="btnWeek">
      <span class="bnav-icon">⊞</span>
      <span class="bnav-label">Semaine</span>
    </button>
    <button class="bnav-btn" id="btnDay">
      <span class="bnav-icon">◻</span>
      <span class="bnav-label">Aujourd'hui</span>
    </button>
    <button class="bnav-fab" id="quickAddBtn">
      <span>+</span>
    </button>
    <button class="bnav-btn" id="openSettings">
      <span class="bnav-icon">⚙</span>
      <span class="bnav-label">Réglages</span>
    </button>
  </nav>

  <!-- ===== SIDEBAR (desktop) ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">WeekFlow</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle">‹</button>
    </div>

    <nav class="nav-section">
      <span class="nav-label">Vue</span>
      <button class="nav-btn active" id="sidebarBtnWeek">
        <span class="nav-icon">⊞</span>
        <span class="nav-text">Semaine complète</span>
      </button>
      <button class="nav-btn" id="sidebarBtnDay">
        <span class="nav-icon">◻</span>
        <span class="nav-text">Aujourd'hui</span>
      </button>
    </nav>

    <div class="day-picker" id="dayPicker" style="display:none">
      <span class="nav-label">Jour</span>
      <div class="day-pills">
        <button class="day-pill" data-day="0">Dim</button>
        <button class="day-pill active" data-day="1">Lun</button>
        <button class="day-pill" data-day="2">Mar</button>
        <button class="day-pill" data-day="3">Mer</button>
        <button class="day-pill" data-day="4">Jeu</button>
        <button class="day-pill" data-day="5">Ven</button>
        <button class="day-pill" data-day="6">Sam</button>
      </div>
    </div>

    <div class="nav-section">
      <span class="nav-label">Actions</span>
      <button class="quick-add-btn" id="sidebarQuickAdd">
        <span>+</span><span class="nav-text"> Nouvelle activité</span>
      </button>
    </div>

    <div class="sidebar-stats">
      <div class="stat-item">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-lbl">activités</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="statHours">0h</span>
        <span class="stat-lbl">planifiées</span>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="settings-btn" id="sidebarSettings">
        <span>⚙</span><span class="nav-text"> Personnaliser</span>
      </button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main" id="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-toggle" id="topbarToggle">☰</button>
        <h1 class="page-title" id="pageTitle">Ma semaine</h1>
        <span class="date-badge" id="dateBadge"></span>
      </div>
      <div class="topbar-right">
        <span class="stat-chip" id="topStat"></span>
      </div>
    </header>

    <!-- Day strip (day view) -->
    <div class="day-strip" id="dayStrip" style="display:none">
      <button class="dsp" data-day="0">Dim</button>
      <button class="dsp" data-day="1">Lun</button>
      <button class="dsp" data-day="2">Mar</button>
      <button class="dsp" data-day="3">Mer</button>
      <button class="dsp" data-day="4">Jeu</button>
      <button class="dsp" data-day="5">Ven</button>
      <button class="dsp" data-day="6">Sam</button>
    </div>

    <section class="view week-view" id="weekView">
      <div class="week-grid" id="weekGrid"></div>
    </section>

    <section class="view day-view" id="dayView" style="display:none">
      <div class="day-full" id="dayFull"></div>
    </section>
  </main>

  <!-- ===== MODAL: Activité ===== -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nouvelle activité</h2>
        <button class="modal-close" id="closeTaskModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Titre</label>
          <input type="text" id="taskName" placeholder="Ex: Cours de maths…" maxlength="80" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Jour</label>
            <select id="taskDay">
              <option value="1">Lundi</option>
              <option value="2">Mardi</option>
              <option value="3">Mercredi</option>
              <option value="4">Jeudi</option>
              <option value="5">Vendredi</option>
              <option value="6">Samedi</option>
              <option value="0">Dimanche</option>
            </select>
          </div>
          <div class="form-group">
            <label>Catégorie</label>
            <select id="taskCategory">
              <option value="perso">🏠 Perso</option>
              <option value="etudes">📚 Études</option>
              <option value="netimo">💼 Nétimo</option>
              <option value="sport">🏃 Sport</option>
              <option value="social">💬 Social</option>
              <option value="sante">❤️ Santé</option>
              <option value="loisir">🎮 Loisir</option>
              <option value="autre">📌 Autre</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>⏱ Début</label>
            <input type="time" id="taskTimeStart" value="09:00" />
          </div>
          <div class="form-group">
            <label>⏹ Fin</label>
            <input type="time" id="taskTimeEnd" value="10:00" />
          </div>
        </div>
        <!-- Duration preview -->
        <div class="duration-preview" id="durationPreview">Durée : 1h00</div>
        <div class="form-group">
          <label>Note (optionnel)</label>
          <textarea id="taskNote" placeholder="Détails, rappels…" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Priorité</label>
          <div class="priority-selector">
            <button class="prio-btn" data-prio="low">🟢 Basse</button>
            <button class="prio-btn active" data-prio="mid">🟡 Moyenne</button>
            <button class="prio-btn" data-prio="high">🔴 Haute</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="deleteTaskBtn" style="display:none">Supprimer</button>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button class="btn-ghost" id="cancelTaskBtn">Annuler</button>
          <button class="btn-primary" id="saveTaskBtn">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Settings ===== -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>Personnalisation</h2>
        <button class="modal-close" id="closeSettings">✕</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>Apparence</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Thème</label>
              <div class="color-swatches" id="themeSwatches">
                <button class="swatch active" data-theme="midnight" style="background:#0d1117" title="Midnight"></button>
                <button class="swatch" data-theme="forest" style="background:#0a2e1a" title="Forêt"></button>
                <button class="swatch" data-theme="ocean" style="background:#0a1628" title="Océan"></button>
                <button class="swatch" data-theme="dusk" style="background:#1a0a2e" title="Crépuscule"></button>
                <button class="swatch" data-theme="warm" style="background:#1a0d00" title="Chaleur"></button>
                <button class="swatch" data-theme="light" style="background:#f5f0e8;outline:1px solid #ccc" title="Clair"></button>
              </div>
            </div>
            <div class="form-group">
              <label>Accent</label>
              <div class="color-swatches" id="accentSwatches">
                <button class="swatch active" data-accent="cyan" style="background:#00e5ff"></button>
                <button class="swatch" data-accent="lime" style="background:#b5ff5a"></button>
                <button class="swatch" data-accent="pink" style="background:#ff4da6"></button>
                <button class="swatch" data-accent="gold" style="background:#ffd166"></button>
                <button class="swatch" data-accent="violet" style="background:#b57bee"></button>
                <button class="swatch" data-accent="orange" style="background:#ff7043"></button>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Police</label>
              <select id="fontSelect">
                <option value="playfair">Playfair Display</option>
                <option value="mono">DM Mono</option>
                <option value="sans">DM Sans</option>
              </select>
            </div>
            <div class="form-group">
              <label>Densité</label>
              <select id="densitySelect">
                <option value="comfy">Confortable</option>
                <option value="compact">Compact</option>
                <option value="spacious">Aéré</option>
              </select>
            </div>
          </div>
        </div>

        <div class="settings-section">
          <h3>Semaine</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Début de semaine</label>
              <select id="weekStartSelect">
                <option value="1">Lundi</option>
                <option value="0">Dimanche</option>
              </select>
            </div>
            <div class="form-group">
              <label>Mon prénom</label>
              <input type="text" id="userNameInput" placeholder="Victor" maxlength="30" />
            </div>
          </div>
        </div>

        <div class="settings-section">
          <h3>Couleurs par catégorie</h3>
          <div class="cat-colors" id="catColors"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="resetDataBtn">Réinitialiser</button>
        <button class="btn-primary" id="saveSettingsBtn" style="margin-left:auto">Sauvegarder</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
